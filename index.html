<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>급식 알림장</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="phone-shell">
      <section id="loginScreen" class="login-screen">
        <div class="login-card">
          <div class="app-icon" aria-hidden="true">🎓</div>
          <h1>급식 알림장</h1>
          <p>학교 급식을 쉽고 빠르게 확인하세요</p>

          <form id="profileForm" class="login-form">
            <label class="field">
              <span>학교명</span>
              <input id="profileSchool" type="text" placeholder="예: 서울고등학교" required />
            </label>

            <div class="field-grid">
              <label class="field">
                <span>학년</span>
                <input id="profileGrade" type="number" min="1" max="6" placeholder="1" required />
              </label>
              <label class="field">
                <span>반</span>
                <input id="profileClass" type="number" min="1" placeholder="1" required />
              </label>
              <label class="field">
                <span>번호</span>
                <input id="profileNumber" type="number" min="1" placeholder="1" required />
              </label>
            </div>

            <label class="field">
              <span>이름</span>
              <input id="profileName" type="text" placeholder="홍길동" required />
            </label>

            <button class="primary-button" type="submit">로그인</button>
            <button id="guestButton" class="secondary-button" type="button">게스트로 급식만 확인하기</button>
          </form>

          <div class="hint-box">알레르기 정보와 급식 의견은 테스트용으로 저장됩니다.</div>
        </div>
      </section>

      <section id="dashboard" class="dashboard" hidden>
        <header class="top-bar">
          <div>
            <h1>급식 알림장</h1>
            <p id="welcomeText">오늘도 맛있게 먹어요</p>
          </div>
          <div class="top-actions">
            <button id="showSearchButton" class="icon-button" type="button" aria-label="학교 검색">🔎</button>
            <button id="logoutButton" class="icon-button" type="button" aria-label="로그아웃">↩</button>
          </div>
        </header>

        <section id="attendanceCard" class="stat-card page-panel active-page" data-page="home">
          <div>
            <span>연속 출석</span>
            <strong id="attendanceCount">1일</strong>
          </div>
          <div class="stat-icon">🔥</div>
        </section>

        <section id="searchPanel" class="card search-card page-panel active-page" data-page="home" hidden>
          <div class="search-row">
            <label class="field grow">
              <span>학교 이름</span>
              <input id="schoolInput" type="search" placeholder="예: 서울고등학교" />
            </label>
            <button id="searchButton" class="primary-button compact-button" type="button">검색</button>
          </div>

          <div id="schoolResults" class="school-results" aria-live="polite"></div>
        </section>

        <section class="card calendar-card page-panel" data-page="calendar">
          <div class="monthly-heading">
            <div>
              <p>월간 캘린더</p>
              <h2 id="monthTitle">이번 달 급식</h2>
            </div>
            <label class="field month-field">
              <span>월 선택</span>
              <input id="monthInput" type="month" />
            </label>
          </div>

          <div class="actions">
            <button id="loadMonthButton" class="primary-button" type="button">한 달 급식 불러오기</button>
          </div>

          <div id="monthCalendar" class="month-calendar" aria-label="월간 급식 캘린더"></div>
          <div id="monthlyMealList" class="monthly-meal-list" aria-live="polite"></div>
        </section>

        <section id="calendarDetailModal" class="calendar-detail-modal" hidden>
          <div class="calendar-detail-backdrop" data-close-calendar-detail></div>
          <article class="calendar-detail-card" role="dialog" aria-modal="true" aria-labelledby="calendarDetailTitle">
            <button id="closeCalendarDetailButton" class="detail-close-button" type="button" aria-label="상세 닫기">×</button>
            <div class="detail-date-badge">
              <span id="calendarDetailWeekday">월</span>
              <strong id="calendarDetailDay">1</strong>
            </div>
            <div class="detail-content">
              <p id="calendarDetailSchool">선택된 학교 없음</p>
              <h2 id="calendarDetailTitle">급식 상세</h2>
              <span id="calendarDetailCalorie" class="calorie">-</span>
            </div>
            <div id="calendarDetailMenu" class="detail-menu-list"></div>
            <button id="calendarDetailUseButton" class="primary-button full-button" type="button">이 날짜 급식으로 보기</button>
          </article>
        </section>

        <input id="dateInput" type="date" hidden />

        <section class="card meal-card page-panel active-page" data-page="home">
          <div class="meal-heading">
            <div>
              <p id="selectedSchoolLabel">학교를 검색해서 선택해주세요</p>
              <h2 id="mealTitle">오늘 급식</h2>
            </div>
            <span id="mealCalorie" class="calorie">-</span>
          </div>

          <div class="meal-tabs">
            <button id="lunchTab" class="meal-tab active" type="button" data-meal-type="lunch">점심</button>
            <button id="dinnerTab" class="meal-tab" type="button" data-meal-type="dinner">저녁</button>
          </div>

          <div id="mealCard" class="meal-list" aria-live="polite"></div>

          <div id="allergyBox" class="allergy-box">
            <strong>⚠ 알레르기 정보</strong>
            <p>우유, 계란, 대두, 밀 성분을 확인하세요.</p>
          </div>

          <div class="actions">
            <button id="loadMealButton" class="primary-button" type="button">급식 불러오기</button>
          </div>
        </section>

        <section class="card comment-card page-panel" data-page="chat">
          <h2>급식 의견</h2>
          <div id="commentList" class="comment-list"></div>
          <div id="commentForm" class="comment-form">
            <input id="commentInput" type="text" placeholder="오늘 급식 어땠나요?" />
            <button id="addCommentButton" class="primary-button compact-button" type="button">등록</button>
          </div>
        </section>

        <section class="card mypage-card page-panel" data-page="mypage">
          <div class="mypage-hero">
            <div class="mypage-avatar" aria-hidden="true">👤</div>
            <div>
              <p>마이페이지</p>
              <h2 id="profileSummary">게스트</h2>
            </div>
          </div>

          <div class="profile-list">
            <div>
              <span>학교</span>
              <strong id="profileSchoolName">선택된 학교 없음</strong>
            </div>
            <div>
              <span>출석</span>
              <strong id="profileAttendance">0일</strong>
            </div>
            <div>
              <span>현재 급식</span>
              <strong id="profileMealType">점심</strong>
            </div>
          </div>

          <button id="mypageLogoutButton" class="secondary-button full-button" type="button">로그아웃</button>
        </section>

        <nav class="bottom-nav" aria-label="앱 페이지 이동">
          <button class="nav-button active" type="button" data-target-page="home">
            <span>🏠</span>
            홈
          </button>
          <button class="nav-button" type="button" data-target-page="calendar">
            <span>📅</span>
            달력
          </button>
          <button class="nav-button" type="button" data-target-page="chat">
            <span>💬</span>
            채팅
          </button>
          <button class="nav-button" type="button" data-target-page="mypage">
            <span>👤</span>
            마이페이지
          </button>
        </nav>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
